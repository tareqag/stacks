<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stacks — Offline Audiobooks</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Stacks%22,%22short_name%22:%22Stacks%22,%22display%22:%22standalone%22,%22background_color%22:%22%2310100f%22,%22theme_color%22:%22%2310100f%22}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#0f0f0e;
  --surface:#17171a;
  --surface2:#1f1f22;
  --hair:#2b2b2e;
  --bone:#ece7da;
  --muted:#8c887d;
  --brass:#c9a44c;
  --brass-dim:#7a6736;
  --danger:#a8554a;
  --serif:'Fraunces', serif;
  --sans:'IBM Plex Sans', sans-serif;
  --mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--ink);
  color:var(--bone);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:88px;
}

/* HEADER */
header{
  padding:28px 20px 16px;
  position:sticky;
  top:0;
  background:linear-gradient(var(--ink) 80%, transparent);
  z-index:10;
}
.wordmark{
  font-family:var(--serif);
  font-weight:600;
  font-size:28px;
  letter-spacing:0.01em;
  display:flex;
  align-items:baseline;
  gap:8px;
}
.wordmark .dot{color:var(--brass);}
.tagline{
  font-family:var(--mono);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--muted);
  margin-top:4px;
}

/* TABS */
.tabs{
  display:flex;
  gap:4px;
  margin:18px 20px 0;
  border-bottom:1px solid var(--hair);
}
.tab{
  flex:1;
  text-align:center;
  padding:10px 0 12px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  background:none;
  border-left:none;border-right:none;border-top:none;
}
.tab.active{color:var(--brass);border-bottom-color:var(--brass);}

/* SEARCH */
.search-bar{
  margin:18px 20px;
  position:relative;
}
.search-bar input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--hair);
  border-radius:3px;
  padding:13px 16px;
  color:var(--bone);
  font-family:var(--sans);
  font-size:15px;
  outline:none;
}
.search-bar input:focus{border-color:var(--brass-dim);}
.search-bar input::placeholder{color:var(--muted);}

.hint{
  margin:0 20px 8px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.04em;
}

main{flex:1; padding: 0 20px;}

/* RESULT ROW (spine list) */
.spine{
  display:flex;
  align-items:stretch;
  gap:14px;
  padding:14px 0;
  border-bottom:1px solid var(--hair);
  cursor:pointer;
}
.spine:active{background:rgba(255,255,255,0.02);}
.spine-bar{
  width:6px;
  border-radius:2px;
  background:var(--brass-dim);
  flex-shrink:0;
}
.spine-cover{
  width:46px;
  height:64px;
  flex-shrink:0;
  border-radius:2px;
  background:var(--surface2);
  background-size:cover;
  background-position:center;
  border:1px solid var(--hair);
}
.spine-info{flex:1; min-width:0;}
.spine-title{
  font-family:var(--serif);
  font-size:17px;
  font-weight:500;
  line-height:1.25;
  margin-bottom:3px;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.spine-author{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--muted);
  letter-spacing:0.03em;
}
.spine-meta{
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--brass-dim);
  margin-top:6px;
  letter-spacing:0.04em;
}

/* EMPTY STATES */
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}
.empty .glyph{font-size:34px; margin-bottom:14px; opacity:.5;}
.empty .msg{font-family:var(--serif); font-size:17px; color:var(--bone); margin-bottom:6px;}
.empty .sub{font-family:var(--sans); font-size:13px; color:var(--muted); line-height:1.5;}

.loading{
  text-align:center;
  padding:40px 0;
  font-family:var(--mono);
  font-size:12px;
  color:var(--brass-dim);
  letter-spacing:0.08em;
  text-transform:uppercase;
}

/* DETAIL SHEET */
.sheet-overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  z-index:50;
  display:none;
}
.sheet-overlay.show{display:block;}
.sheet{
  position:fixed;
  left:0; right:0; bottom:0;
  max-width:560px;
  margin:0 auto;
  background:var(--surface);
  border-top:1px solid var(--hair);
  border-radius:14px 14px 0 0;
  z-index:51;
  max-height:84vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .25s ease;
  padding-bottom:env(safe-area-inset-bottom);
}
.sheet.show{transform:translateY(0);}
.sheet-handle{
  width:36px; height:4px;
  background:var(--hair);
  border-radius:2px;
  margin:12px auto 4px;
}
.sheet-head{
  display:flex;
  gap:16px;
  padding:18px 20px 8px;
}
.sheet-cover{
  width:80px; height:112px;
  border-radius:3px;
  background:var(--surface2);
  background-size:cover;
  background-position:center;
  border:1px solid var(--hair);
  flex-shrink:0;
}
.sheet-title{font-family:var(--serif); font-size:20px; font-weight:600; line-height:1.2;}
.sheet-author{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:6px;}
.sheet-desc{
  font-family:var(--sans); font-size:13px; line-height:1.6; color:#bdb9ac;
  padding:14px 20px; border-top:1px solid var(--hair); margin-top:14px;
  max-height:120px; overflow-y:auto;
}
.chapter-list{padding:6px 20px 20px;}
.chapter-row{
  display:flex; align-items:center; gap:12px;
  padding:11px 0;
  border-bottom:1px solid var(--hair);
}
.chapter-num{font-family:var(--mono); font-size:11px; color:var(--brass-dim); width:24px;}
.chapter-name{flex:1; font-family:var(--sans); font-size:13.5px; color:var(--bone); overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chapter-size{font-family:var(--mono); font-size:10.5px; color:var(--muted);}

.btn{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  border:1px solid var(--brass-dim);
  background:transparent;
  color:var(--brass);
  padding:10px 16px;
  border-radius:3px;
  cursor:pointer;
}
.btn:active{background:rgba(201,164,76,0.08);}
.btn.full{width:calc(100% - 40px); margin:8px 20px 16px; padding:14px; font-size:13px;}
.btn.full:disabled{opacity:0.4;}
.btn-row{padding:0 20px;}

/* LIBRARY GRID */
.lib-item{
  display:flex; align-items:stretch; gap:14px;
  padding:14px 0; border-bottom:1px solid var(--hair);
  cursor:pointer;
}
.progress-track{
  height:2px; background:var(--hair); border-radius:1px; margin-top:8px; overflow:hidden;
}
.progress-fill{height:100%; background:var(--brass);}

/* PLAYER BAR */
.player-bar{
  position:fixed; left:0; right:0; bottom:0;
  max-width:560px; margin:0 auto;
  background:var(--surface2);
  border-top:1px solid var(--hair);
  display:none;
  z-index:40;
  padding-bottom:env(safe-area-inset-bottom);
}
.player-bar.show{display:block;}
.player-top{display:flex; align-items:center; gap:12px; padding:10px 16px 6px;}
.player-cover{width:40px; height:40px; border-radius:3px; background:var(--surface); flex-shrink:0; background-size:cover; background-position:center;}
.player-text{flex:1; min-width:0;}
.player-title{font-family:var(--serif); font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.player-chapter{font-family:var(--mono); font-size:10.5px; color:var(--muted);}
.player-controls{display:flex; align-items:center; gap:18px;}
.player-controls button{
  background:none; border:none; color:var(--bone); cursor:pointer; padding:4px;
}
.player-controls svg{width:22px;height:22px;}
.play-btn svg{width:30px;height:30px;}
.player-seek{
  padding:0 16px 10px;
  display:flex; align-items:center; gap:8px;
}
.player-seek input[type=range]{
  flex:1; accent-color:var(--brass); height:3px;
}
.player-time{font-family:var(--mono); font-size:10px; color:var(--muted); min-width:36px;}
.rate-btn{font-family:var(--mono); font-size:11px; color:var(--brass); background:none; border:1px solid var(--brass-dim); border-radius:3px; padding:3px 7px; cursor:pointer;}

/* TOAST */
.toast{
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:var(--surface2); border:1px solid var(--hair); color:var(--bone);
  font-family:var(--mono); font-size:12px;
  padding:10px 18px; border-radius:20px; z-index:60;
  opacity:0; transition:opacity .25s;
  pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;}

/* FAVORITE STAR */
.fav-btn{
  background:none; border:none; cursor:pointer; padding:6px;
  color:var(--muted); flex-shrink:0; align-self:flex-start;
}
.fav-btn svg{width:18px;height:18px;}
.fav-btn.active{color:var(--brass);}

/* LIB ROW extras */
.lib-row-actions{display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0;}
.lib-delete-btn{background:none; border:none; color:var(--muted); cursor:pointer; padding:6px;}
.lib-delete-btn svg{width:16px;height:16px;}
.lib-delete-btn:active{color:var(--danger);}
.book-pct{font-family:var(--mono); font-size:10px; color:var(--brass-dim); margin-top:2px; text-align:right;}
.chapter-pct{font-family:var(--mono); font-size:10px; color:var(--muted); min-width:34px; text-align:right;}
.chapter-pct.done{color:var(--brass);}
.chapter-row.playing .chapter-name{color:var(--brass);}

/* SHEET header actions */
.sheet-head-actions{
  position:absolute; top:10px; right:10px;
  display:flex; align-items:center; gap:2px;
}

/* TRANSPORT ROW inside sheet */
.transport-row{
  display:flex; align-items:center; justify-content:center; gap:28px;
  padding:6px 20px 14px;
}
.transport-row button{background:none; border:none; color:var(--bone); cursor:pointer; padding:6px;}
.transport-row svg{width:26px;height:26px;}
.transport-row .tp-play svg{width:38px;height:38px;}
.skip-label{position:relative;}
.skip-label .num{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:var(--mono); font-size:8px; color:var(--ink); font-weight:600;
}

.delete-row{padding:0 20px 18px;}
.btn.danger{border-color:var(--danger); color:var(--danger);}
.btn.danger:active{background:rgba(168,85,74,0.08);}

/* RECOMMENDED */
.section-label{
  font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
  color:var(--muted); margin:8px 0 4px;
}
#recommended{margin-bottom:22px;}

::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="wordmark">Stacks<span class="dot">·</span></div>
    <div class="tagline">Public-domain audiobooks, kept on your phone</div>
    <div class="tabs">
      <button class="tab active" data-tab="search">Search</button>
      <button class="tab" data-tab="library">My Shelf</button>
    </div>
  </header>

  <main>

    <!-- SEARCH VIEW -->
    <div id="view-search">
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Title or author — try 'Musashi' or 'Dumas'" autocomplete="off">
      </div>
      <div class="hint" id="searchHint">Pulls from the LibriVox public-domain catalogue on archive.org.</div>
      <div id="recommended"></div>
      <div id="searchResults"></div>
    </div>

    <!-- LIBRARY VIEW -->
    <div id="view-library" style="display:none;">
      <div id="libraryList"></div>
    </div>

  </main>

</div>

<!-- DETAIL SHEET -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head-actions">
    <button class="fav-btn" id="sheetFavBtn" aria-label="Favorite">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.3l-6.16 3.6 1.64-7-5.36-4.64 7.06-.6L12 2l2.82 6.66 7.06.6-5.36 4.64 1.64 7z"/></svg>
    </button>
    <button id="sheetClose" aria-label="Close" style="background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:6px;">&times;</button>
  </div>
  <div class="sheet-head">
    <div class="sheet-cover" id="sheetCover"></div>
    <div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-author" id="sheetAuthor"></div>
    </div>
  </div>
  <div class="transport-row" id="sheetTransport" style="display:none;">
    <button id="sheetBack15" aria-label="Back 15 seconds">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V2L7 7l5 5V9c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
    <button class="tp-play" id="sheetPlayPause" aria-label="Play or pause">
      <svg viewBox="0 0 24 24" fill="currentColor"><path id="sheetPlayIcon" d="M8 5v14l11-7z"/></svg>
    </button>
    <button id="sheetFwd15" aria-label="Forward 15 seconds">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V2l5 5-5 5V9c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
    </button>
  </div>
  <div class="btn-row">
    <button class="btn full" id="sheetAction">Download all chapters</button>
  </div>
  <div class="sheet-desc" id="sheetDesc"></div>
  <div class="chapter-list" id="sheetChapters"></div>
  <div class="delete-row" id="sheetDeleteRow" style="display:none;">
    <button class="btn full danger" id="sheetDeleteBtn">Remove from shelf</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player-bar" id="playerBar">
  <div class="player-top">
    <div class="player-cover" id="playerCover"></div>
    <div class="player-text" id="playerTextArea" style="cursor:pointer;">
      <div class="player-title" id="playerTitle">—</div>
      <div class="player-chapter" id="playerChapter">—</div>
    </div>
    <div class="player-controls">
      <button id="prevBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path id="playIcon" d="M8 5v14l11-7z"/></svg></button>
      <button id="nextBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-9.5 6l8.5 6V6z"/></svg></button>
      <button class="rate-btn" id="rateBtn">1.0×</button>
    </div>
  </div>
  <div class="player-seek">
    <span class="player-time" id="curTime">0:00</span>
    <input type="range" id="seekBar" min="0" max="100" value="0">
    <span class="player-time" id="durTime">0:00</span>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audioEl"></audio>

<script>
/* ---------- IndexedDB storage layer ---------- */
const DB_NAME='stacks-db', DB_VER=2;
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books')) d.createObjectStore('books',{keyPath:'identifier'});
      if(!d.objectStoreNames.contains('files')) d.createObjectStore('files',{keyPath:'key'});
      if(!d.objectStoreNames.contains('favorites')) d.createObjectStore('favorites',{keyPath:'identifier'});
    };
    req.onsuccess=e=>{db=e.target.result; res(db);};
    req.onerror=e=>rej(e);
  });
}
function idbPut(store,val){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).put(val);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  });
}
function idbGet(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function idbGetAll(store){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function idbDelete(store,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  });
}

/* ---------- UI helpers ---------- */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}
function coverUrl(identifier){
  return `https://archive.org/services/img/${identifier}`;
}
function fmtBytes(b){
  if(!b) return '';
  const mb=b/1048576;
  return mb<1 ? Math.round(b/1024)+' KB' : mb.toFixed(1)+' MB';
}
function fmtTime(s){
  if(!isFinite(s)||s<0) s=0;
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return m+':'+String(sec).padStart(2,'0');
}

/* ---------- Favorites ---------- */
async function isFavorited(identifier){
  const fav=await idbGet('favorites',identifier);
  if(fav) return true;
  const book=await idbGet('books',identifier);
  return !!(book && book.favorite);
}
async function toggleFavorite(identifier,meta){
  const already=await isFavorited(identifier);
  const book=await idbGet('books',identifier);
  if(already){
    await idbDelete('favorites',identifier);
    if(book){ book.favorite=false; await idbPut('books',book); }
    toast('Removed from favorites');
  }else{
    await idbPut('favorites',{identifier, title:meta.title, author:meta.author, favoritedAt:Date.now()});
    if(book){ book.favorite=true; await idbPut('books',book); }
    toast('Added to favorites');
  }
  return !already;
}

/* ---------- Progress math ---------- */
function chapterPercent(ch){
  if(!ch) return 0;
  if(ch.completed) return 100;
  if(ch.duration) return Math.min(100, Math.round((ch.elapsed||0)/ch.duration*100));
  return 0;
}
function bookPercent(book){
  const chs=book.chapterMeta||[];
  if(!chs.length) return 0;
  const sum=chs.reduce((acc,ch)=>acc+chapterPercent(ch),0);
  return Math.round(sum/chs.length);
}

/* ---------- Tabs ---------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const which=tab.dataset.tab;
    document.getElementById('view-search').style.display = which==='search'?'block':'none';
    document.getElementById('view-library').style.display = which==='library'?'block':'none';
    if(which==='library') renderLibrary();
    if(which==='search') renderRecommendations();
  });
});

/* ---------- Search ---------- */
let searchDebounce;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(searchDebounce);
  const q=e.target.value.trim();
  if(q.length<2){ document.getElementById('searchResults').innerHTML=''; renderRecommendations(); return; }
  document.getElementById('recommended').innerHTML='';
  searchDebounce=setTimeout(()=>doSearch(q),400);
});

async function doSearch(q){
  const resultsEl=document.getElementById('searchResults');
  resultsEl.innerHTML='<div class="loading">Searching the shelves…</div>';
  try{
    let docs=await runQuery(`collection%3A(librivoxaudio)+AND+(${encodeURIComponent(q)})`);
    let expanded=false;
    if(!docs.length){
      // fallback: widen to any free spoken-word audio on archive.org, not just the strict LibriVox collection
      docs=await runQuery(`mediatype%3A(audio)+AND+(${encodeURIComponent(q)})`);
      expanded=true;
    }
    if(!docs.length){
      resultsEl.innerHTML=`<div class="empty"><div class="glyph">⌗</div><div class="msg">No matches</div><div class="sub">This title may not have a free public-domain recording — try a broader search, or just the author's surname.</div></div>`;
      return;
    }
    resultsEl.innerHTML='';
    if(expanded){
      const note=document.createElement('div');
      note.className='hint';
      note.style.margin='0 0 10px';
      note.textContent='No exact LibriVox match — showing broader free-audio results instead.';
      resultsEl.appendChild(note);
    }
    docs.forEach(doc=>{
      const author=Array.isArray(doc.creator)?doc.creator[0]:(doc.creator||'Unknown author');
      const row=document.createElement('div');
      row.className='spine';
      row.innerHTML=`
        <div class="spine-bar"></div>
        <div class="spine-cover" style="background-image:url('${coverUrl(doc.identifier)}')"></div>
        <div class="spine-info">
          <div class="spine-title">${escapeHtml(doc.title||'Untitled')}</div>
          <div class="spine-author">${escapeHtml(author)}</div>
          <div class="spine-meta">LIBRIVOX · FREE</div>
        </div>
        <button class="fav-btn" data-id="${doc.identifier}" aria-label="Favorite">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.3l-6.16 3.6 1.64-7-5.36-4.64 7.06-.6L12 2l2.82 6.66 7.06.6-5.36 4.64 1.64 7z"/></svg>
        </button>`;
      row.addEventListener('click',e=>{
        if(e.target.closest('.fav-btn')) return;
        openDetail(doc.identifier,doc.title,author);
      });
      isFavorited(doc.identifier).then(fav=>{
        if(fav) row.querySelector('.fav-btn').classList.add('active');
      });
      row.querySelector('.fav-btn').addEventListener('click',async e=>{
        e.stopPropagation();
        const nowFav=await toggleFavorite(doc.identifier,{title:doc.title||'Untitled',author});
        e.currentTarget.classList.toggle('active',nowFav);
      });
      resultsEl.appendChild(row);
    });
  }catch(err){
    resultsEl.innerHTML=`<div class="empty"><div class="glyph">!</div><div class="msg">Couldn't reach the catalogue</div><div class="sub">Check your connection and try again.</div></div>`;
  }
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function runQuery(qFragment){
  const url=`https://archive.org/advancedsearch.php?q=${qFragment}&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=runtime&rows=24&output=json`;
  const res=await fetch(url);
  const data=await res.json();
  return data.response.docs||[];
}

/* ---------- Recommendations ---------- */
function renderSpineRow(doc, container){
  const author=Array.isArray(doc.creator)?doc.creator[0]:(doc.creator||'Unknown author');
  const row=document.createElement('div');
  row.className='spine';
  row.innerHTML=`
    <div class="spine-bar"></div>
    <div class="spine-cover" style="background-image:url('${coverUrl(doc.identifier)}')"></div>
    <div class="spine-info">
      <div class="spine-title">${escapeHtml(doc.title||'Untitled')}</div>
      <div class="spine-author">${escapeHtml(author)}</div>
      <div class="spine-meta">LIBRIVOX · FREE</div>
    </div>
    <button class="fav-btn" data-id="${doc.identifier}" aria-label="Favorite">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.3l-6.16 3.6 1.64-7-5.36-4.64 7.06-.6L12 2l2.82 6.66 7.06.6-5.36 4.64 1.64 7z"/></svg>
    </button>`;
  row.addEventListener('click',e=>{
    if(e.target.closest('.fav-btn')) return;
    openDetail(doc.identifier,doc.title,author);
  });
  isFavorited(doc.identifier).then(fav=>{
    if(fav) row.querySelector('.fav-btn').classList.add('active');
  });
  row.querySelector('.fav-btn').addEventListener('click',async e=>{
    e.stopPropagation();
    const nowFav=await toggleFavorite(doc.identifier,{title:doc.title||'Untitled',author});
    e.currentTarget.classList.toggle('active',nowFav);
  });
  container.appendChild(row);
}

async function renderRecommendations(){
  const box=document.getElementById('recommended');
  const q=document.getElementById('searchInput').value.trim();
  if(q.length>=2){ box.innerHTML=''; return; } // only show when search is empty

  const [favs, books] = await Promise.all([idbGetAll('favorites'), idbGetAll('books')]);
  const ownedIds=new Set(books.map(b=>b.identifier));
  const authorSet=new Set();
  favs.forEach(f=>{ if(f.author) authorSet.add(f.author); });
  books.filter(b=>b.favorite).forEach(b=>{ if(b.author) authorSet.add(b.author); });
  books.forEach(b=>{ if(b.author) authorSet.add(b.author); });

  if(!authorSet.size){ box.innerHTML=''; return; }

  box.innerHTML=`<div class="section-label">Because you've liked these authors</div>`;
  const authors=[...authorSet].slice(0,4);
  let any=false;
  for(const author of authors){
    try{
      const docs=await runQuery(`collection%3A(librivoxaudio)+AND+creator%3A(${encodeURIComponent(author)})`);
      const fresh=docs.filter(d=>!ownedIds.has(d.identifier)).slice(0,3);
      fresh.forEach(d=>{ renderSpineRow(d, box); any=true; });
    }catch(e){ /* skip this author on failure */ }
  }
  if(!any){ box.innerHTML=''; }
}

/* ---------- Detail sheet ---------- */
let currentDetail=null;
async function openDetail(identifier,title,author){
  document.getElementById('sheetDesc').style.display='block';
  document.getElementById('sheetTransport').style.display='none';
  document.getElementById('sheetDeleteRow').style.display='none';
  document.getElementById('sheetTitle').textContent=title||'Untitled';
  document.getElementById('sheetAuthor').textContent=author||'';
  document.getElementById('sheetCover').style.backgroundImage=`url('${coverUrl(identifier)}')`;
  document.getElementById('sheetDesc').textContent='Loading description…';
  document.getElementById('sheetChapters').innerHTML='<div class="loading">Loading chapters…</div>';
  showSheet();

  const res=await fetch(`https://archive.org/metadata/${identifier}`);
  const meta=await res.json();
  const desc=(meta.metadata && meta.metadata.description) || 'No description available.';
  document.getElementById('sheetDesc').innerHTML=desc.replace(/<[^>]+>/g,' ').slice(0,600);

  const mp3s=(meta.files||[]).filter(f=>f.name.toLowerCase().endsWith('.mp3') && !f.name.toLowerCase().includes('_64kb')===false || f.name.toLowerCase().endsWith('.mp3'));
  // de-dupe: prefer 64kb versions, fallback to any mp3, exclude non-chapter files like "readme"
  const seen={};
  const chapters=[];
  (meta.files||[]).filter(f=>f.name.toLowerCase().endsWith('.mp3')).forEach(f=>{
    const base=f.name.replace(/_64kb/i,'').replace(/\.mp3$/i,'');
    if(seen[base] && !f.name.toLowerCase().includes('64kb')) return;
    seen[base]=true;
    chapters.push(f);
  });
  chapters.sort((a,b)=>a.name.localeCompare(b.name));

  currentDetail={identifier,title:title||'Untitled',author:author||'',chapters};

  const existing=await idbGet('books',identifier);
  const chEl=document.getElementById('sheetChapters');
  chEl.innerHTML='';
  chapters.forEach((f,i)=>{
    const row=document.createElement('div');
    row.className='chapter-row';
    row.innerHTML=`<div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
      <div class="chapter-name">${escapeHtml(f.title||f.name)}</div>
      <div class="chapter-size">${fmtBytes(parseInt(f.size||0))}</div>`;
    chEl.appendChild(row);
  });

  const favBtn=document.getElementById('sheetFavBtn');
  const fav=await isFavorited(identifier);
  favBtn.classList.toggle('active',fav);
  favBtn.onclick=async()=>{
    const nowFav=await toggleFavorite(identifier,{title:title||'Untitled',author:author||''});
    favBtn.classList.toggle('active',nowFav);
  };

  const actionBtn=document.getElementById('sheetAction');
  if(existing){
    actionBtn.textContent='Already on your shelf — open it';
    actionBtn.onclick=()=>{ hideSheet(); switchToLibrary(); };
  }else{
    actionBtn.textContent=`Download all ${chapters.length} chapters`;
    actionBtn.onclick=()=>downloadBook(identifier,title,author,chapters);
  }
}
function switchToLibrary(){
  document.querySelector('.tab[data-tab="library"]').click();
}
function showSheet(){
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function hideSheet(){
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
document.getElementById('sheetOverlay').addEventListener('click',hideSheet);
document.getElementById('sheetClose').addEventListener('click',hideSheet);

/* swipe down to dismiss */
(function(){
  const sheetEl=document.getElementById('sheet');
  let startY=null, currentY=0, dragging=false;
  sheetEl.addEventListener('touchstart',e=>{
    if(e.target.closest('.chapter-list, .sheet-desc')) return; // allow inner scroll
    startY=e.touches[0].clientY; dragging=true;
  },{passive:true});
  sheetEl.addEventListener('touchmove',e=>{
    if(!dragging) return;
    currentY=e.touches[0].clientY-startY;
    if(currentY>0) sheetEl.style.transform=`translateY(${currentY}px)`;
  },{passive:true});
  sheetEl.addEventListener('touchend',()=>{
    if(!dragging) return;
    dragging=false;
    if(currentY>90){ hideSheet(); }
    sheetEl.style.transform='';
    currentY=0;
  });
})();

/* ---------- Download ---------- */
async function downloadBook(identifier,title,author,chapters){
  const btn=document.getElementById('sheetAction');
  btn.disabled=true;

  await idbPut('books',{identifier,title:title||'Untitled',author:author||'',
    chapterMeta:chapters.map(f=>({name:f.name,title:f.title||f.name,duration:null,elapsed:0,completed:false})),
    addedAt:Date.now(), progress:{chapterIndex:0,time:0,lastPlayedAt:Date.now()}, favorite:false});

  for(let i=0;i<chapters.length;i++){
    btn.textContent=`Downloading ${i+1} of ${chapters.length}…`;
    const f=chapters[i];
    try{
      const fileRes=await fetch(`https://archive.org/download/${identifier}/${encodeURIComponent(f.name)}`);
      const blob=await fileRes.blob();
      await idbPut('files',{key:identifier+'::'+f.name, blob});
    }catch(e){
      toast(`Chapter ${i+1} failed — retry later`);
    }
  }
  btn.disabled=false;
  btn.textContent='Already on your shelf — open it';
  btn.onclick=()=>{ hideSheet(); switchToLibrary(); };
  toast('Added to your shelf');
}

/* ---------- Library ---------- */
async function renderLibrary(){
  const listEl=document.getElementById('libraryList');
  const books=await idbGetAll('books');
  if(!books.length){
    listEl.innerHTML=`<div class="empty"><div class="glyph">⌸</div><div class="msg">Your shelf is empty</div><div class="sub">Search the catalogue and download a book — it'll stay here, playable with no connection.</div></div>`;
    return;
  }
  listEl.innerHTML='';
  books.sort((a,b)=>{
    const at=a.progress?.lastPlayedAt||a.addedAt;
    const bt=b.progress?.lastPlayedAt||b.addedAt;
    return bt-at;
  }).forEach(book=>{
    const total=book.chapterMeta.length;
    const pct=bookPercent(book);
    const row=document.createElement('div');
    row.className='lib-item';
    row.innerHTML=`
      <div class="spine-cover" style="background-image:url('${coverUrl(book.identifier)}')"></div>
      <div class="spine-info">
        <div class="spine-title">${escapeHtml(book.title)}</div>
        <div class="spine-author">${escapeHtml(book.author)}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="spine-meta">${total} chapter${total!==1?'s':''} · ${pct}% complete</div>
      </div>
      <div class="lib-row-actions">
        <button class="fav-btn ${book.favorite?'active':''}" data-id="${book.identifier}" aria-label="Favorite">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.3l-6.16 3.6 1.64-7-5.36-4.64 7.06-.6L12 2l2.82 6.66 7.06.6-5.36 4.64 1.64 7z"/></svg>
        </button>
        <button class="lib-delete-btn" data-id="${book.identifier}" aria-label="Remove">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 7h12l-1 13H7L6 7zm3-3h6l1 2H8l1-2zM9 10v7m3-7v7m3-7v7" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
        </button>
      </div>`;
    row.addEventListener('click',e=>{
      if(e.target.closest('.fav-btn') || e.target.closest('.lib-delete-btn')) return;
      openLibraryDetail(book);
    });
    row.querySelector('.fav-btn').addEventListener('click',async e=>{
      e.stopPropagation();
      const nowFav=await toggleFavorite(book.identifier,{title:book.title,author:book.author});
      e.currentTarget.classList.toggle('active',nowFav);
    });
    row.querySelector('.lib-delete-btn').addEventListener('click',e=>{
      e.stopPropagation();
      confirmDelete(book);
    });
    listEl.appendChild(row);
  });
}
async function openLibraryDetail(book){
  document.getElementById('sheetTitle').textContent=book.title;
  document.getElementById('sheetAuthor').textContent=book.author;
  document.getElementById('sheetCover').style.backgroundImage=`url('${coverUrl(book.identifier)}')`;
  document.getElementById('sheetDesc').textContent='';
  document.getElementById('sheetDesc').style.display='none';
  document.getElementById('sheetTransport').style.display='flex';
  document.getElementById('sheetDeleteRow').style.display='block';
  showSheet();

  const idx=book.progress?.chapterIndex||0;
  const pct=bookPercent(book);
  const actionBtn=document.getElementById('sheetAction');
  actionBtn.textContent = pct>0
    ? `Resume — Chapter ${idx+1} · ${pct}% complete`
    : 'Start listening';
  actionBtn.onclick=()=>{ hideSheet(); playBook(book); };

  const favBtn=document.getElementById('sheetFavBtn');
  favBtn.classList.toggle('active',!!book.favorite);
  favBtn.onclick=async()=>{
    const nowFav=await toggleFavorite(book.identifier,{title:book.title,author:book.author});
    favBtn.classList.toggle('active',nowFav);
  };

  document.getElementById('sheetDeleteBtn').onclick=()=>{ hideSheet(); confirmDelete(book); };

  function isThisBookActive(){ return playerBook && playerBook.identifier===book.identifier; }
  function syncPlayIcon(){
    const playing = isThisBookActive() && !audioEl.paused;
    document.getElementById('sheetPlayIcon').setAttribute('d', playing
      ? 'M6 5h4v14H6zm8 0h4v14h-4z' : 'M8 5v14l11-7z');
  }
  syncPlayIcon();
  document.getElementById('sheetPlayPause').onclick=async()=>{
    if(!isThisBookActive()) await playBook(book);
    else if(audioEl.paused) audioEl.play(); else audioEl.pause();
    syncPlayIcon();
  };
  document.getElementById('sheetBack15').onclick=async()=>{
    if(!isThisBookActive()) await playBook(book);
    audioEl.currentTime=Math.max(0,audioEl.currentTime-15);
  };
  document.getElementById('sheetFwd15').onclick=async()=>{
    if(!isThisBookActive()) await playBook(book);
    audioEl.currentTime=Math.min(audioEl.duration||audioEl.currentTime+15,audioEl.currentTime+15);
  };
  audioEl.addEventListener('play',syncPlayIcon);
  audioEl.addEventListener('pause',syncPlayIcon);

  const chEl=document.getElementById('sheetChapters');
  chEl.innerHTML='';
  book.chapterMeta.forEach((ch,i)=>{
    const cp=chapterPercent(ch);
    const row=document.createElement('div');
    row.className='chapter-row'+(i===idx?' playing':'');
    row.style.cursor='pointer';
    row.innerHTML=`<div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
      <div class="chapter-name">${escapeHtml(ch.title||ch.name)}</div>
      <div class="chapter-pct ${cp>=100?'done':''}">${cp}%</div>`;
    row.addEventListener('click',()=>{ hideSheet(); playBook(book,i); });
    chEl.appendChild(row);
  });
}
async function confirmDelete(book){
  if(!confirm(`Remove "${book.title}" from your shelf? This deletes the downloaded files.`)) return;
  for(const ch of book.chapterMeta) await idbDelete('files',book.identifier+'::'+ch.name);
  await idbDelete('books',book.identifier);
  renderLibrary();
  toast('Removed');
}

/* ---------- Player ---------- */
const audioEl=document.getElementById('audioEl');
let playerBook=null, playerIndex=0, currentBlobUrl=null;

async function playBook(book, startIndex){
  playerBook=book;
  playerIndex = startIndex!=null ? startIndex : (book.progress?.chapterIndex||0);
  document.getElementById('playerCover').style.backgroundImage=`url('${coverUrl(book.identifier)}')`;
  document.getElementById('playerTitle').textContent=book.title;
  document.getElementById('playerBar').classList.add('show');
  await loadChapter(playerIndex, book.progress?.time||0);
}
async function loadChapter(index, seekTo){
  const ch=playerBook.chapterMeta[index];
  if(!ch) return;
  document.getElementById('playerChapter').textContent=`Chapter ${index+1} of ${playerBook.chapterMeta.length}`;
  const rec=await idbGet('files',playerBook.identifier+'::'+ch.name);
  if(!rec){ toast('File missing — try redownloading'); return; }
  if(currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl=URL.createObjectURL(rec.blob);
  audioEl.src=currentBlobUrl;
  audioEl.playbackRate=currentRate;
  audioEl.onloadedmetadata=()=>{
    if(seekTo) audioEl.currentTime=seekTo;
    audioEl.play();
  };
  playerIndex=index;
  saveProgress();
}
function saveProgress(){
  if(!playerBook) return;
  playerBook.progress={chapterIndex:playerIndex, time:audioEl.currentTime||0, lastPlayedAt:Date.now()};
  const ch=playerBook.chapterMeta[playerIndex];
  if(ch){
    ch.elapsed=audioEl.currentTime||0;
    if(isFinite(audioEl.duration)) ch.duration=audioEl.duration;
  }
  idbPut('books',playerBook);
}

document.getElementById('playerTextArea').addEventListener('click',()=>{
  if(playerBook) openLibraryDetail(playerBook);
});
document.getElementById('playerCover').addEventListener('click',()=>{
  if(playerBook) openLibraryDetail(playerBook);
});
document.getElementById('playerCover').style.cursor='pointer';

document.getElementById('playBtn').addEventListener('click',()=>{
  if(audioEl.paused) audioEl.play(); else audioEl.pause();
});
audioEl.addEventListener('play',()=>{document.getElementById('playIcon').setAttribute('d','M6 5h4v14H6zm8 0h4v14h-4z');});
audioEl.addEventListener('pause',()=>{document.getElementById('playIcon').setAttribute('d','M8 5v14l11-7z');});
document.getElementById('nextBtn').addEventListener('click',()=>{
  if(playerIndex<playerBook.chapterMeta.length-1) loadChapter(playerIndex+1,0);
});
document.getElementById('prevBtn').addEventListener('click',()=>{
  if(playerIndex>0) loadChapter(playerIndex-1,0);
});
let currentRate=1.0;
document.getElementById('rateBtn').addEventListener('click',()=>{
  const rates=[1.0,1.25,1.5,1.75,2.0,0.75];
  currentRate=rates[(rates.indexOf(currentRate)+1)%rates.length];
  audioEl.playbackRate=currentRate;
  document.getElementById('rateBtn').textContent=currentRate.toFixed(2).replace(/0$/,'')+'×';
});
audioEl.addEventListener('timeupdate',()=>{
  document.getElementById('curTime').textContent=fmtTime(audioEl.currentTime);
  document.getElementById('durTime').textContent=fmtTime(audioEl.duration);
  document.getElementById('seekBar').value = audioEl.duration ? (audioEl.currentTime/audioEl.duration*100) : 0;
  if(Math.floor(audioEl.currentTime)%5===0) saveProgress();
});
audioEl.addEventListener('ended',()=>{
  if(playerBook){
    const ch=playerBook.chapterMeta[playerIndex];
    if(ch){ ch.completed=true; ch.elapsed=ch.duration||ch.elapsed; idbPut('books',playerBook); }
    if(playerIndex<playerBook.chapterMeta.length-1) loadChapter(playerIndex+1,0);
  }
});
document.getElementById('seekBar').addEventListener('input',e=>{
  if(audioEl.duration) audioEl.currentTime = (e.target.value/100)*audioEl.duration;
});

/* ---------- Init ---------- */
openDB().then(()=>{ renderLibrary(); renderRecommendations(); });
</script>
